<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Library Guardians · AR Experience</title>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }

/* ─── Landing Overlay ─── */
#overlay {
  position:fixed; inset:0; z-index:999;
  background: radial-gradient(ellipse at 40% 50%, #120026 0%, #05000f 60%, #000 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-family: 'Georgia', serif;
}
.star { position:absolute; border-radius:50%; background:#fff; pointer-events:none; }
#overlay h1 {
  font-size:2.4em; letter-spacing:0.15em; margin-bottom:50px;
  background: linear-gradient(135deg, #cc88ff, #ffffff, #88bbff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  text-shadow: none; filter: drop-shadow(0 0 20px #8844ff88);
}
#overlay .sub {
  color:#7766aa; font-size:0.85em; letter-spacing:0.3em;
  margin-bottom:40px; text-transform:uppercase;
}
#overlay .instructions {
  color:#665588; font-size:0.82em; line-height:2.2;
  text-align:center; margin-bottom:40px;
  border:1px solid #331155; padding:18px 30px; border-radius:12px;
  background:rgba(30,0,50,0.5);
}
#overlay .instructions span { color:#aa88dd; }
#btn {
  background: linear-gradient(135deg, #3a0075, #7700cc);
  border: 1.5px solid #bb55ff;
  color:#fff; font-size:1.05em; letter-spacing:0.2em;
  padding:16px 44px; border-radius:10px; cursor:pointer;
  box-shadow: 0 0 40px #6600aa66, inset 0 0 20px #ffffff08;
  transition: box-shadow 0.3s, transform 0.2s;
  font-family: 'Georgia', serif;
}
#btn:hover { box-shadow: 0 0 60px #9922ffaa; transform:scale(1.03); }
#btn:active { transform:scale(0.98); }

/* ─── HUD (camera-space subtitle) ─── */
/* Handled via A-Frame entities below */

/* ─── Debug hint bar ─── */
#hint {
  position:fixed; bottom:20px; left:50%;
  transform:translateX(-50%); white-space:nowrap;
  background:rgba(0,0,10,0.75); color:#9988cc;
  border:1px solid #222244; border-radius:20px;
  padding:8px 20px; font-size:0.78em;
  z-index:10; pointer-events:none; display:none;
  font-family: monospace;
}
#orb-counter {
  position:fixed; top:16px; right:16px;
  background:rgba(0,0,10,0.7); color:#aa88dd;
  border-radius:12px; padding:6px 14px;
  font-size:0.75em; font-family:monospace;
  z-index:10; pointer-events:none; display:none;
  border:1px solid #333;
}
</style>
</head>
<body>

<!-- ════════════════ LANDING SCREEN ════════════════ -->
<div id="overlay">
  <h1>Library Guardians</h1>
  <button id="btn" onclick="enterAR()">✦ Begin Experience ✦</button>
</div>

<div id="hint"></div>
<div id="orb-counter">🟡 0/3 排球 &nbsp; 🟣 0/3 JOJO &nbsp; 🔴 0/3 天下</div>

<!-- ════════════════ A-FRAME SCENE ════════════════ -->
<a-scene
  id="scene"
  webxr="requiredFeatures: local-floor; optionalFeatures: dom-overlay, hand-tracking, bounded-floor"
  renderer="antialias:true; alpha:true; colorManagement:true"
  vr-mode-ui="enabled:false"
  device-orientation-permission-ui="enabled:false"
  background="transparent: true">

  <!--
    External PNG portraits at:
      ./assets/guardian.png
      ./assets/wanderer.png

    IMPORTANT: do NOT add `crossorigin="anonymous"` to these <img> tags.
    With that attribute the browser fetches the image in CORS mode and
    requires an `Access-Control-Allow-Origin` response header. file://
    and most local dev servers (Live Server, `python -m http.server`,
    plain nginx without CORS configured, …) don't send that header,
    so the request fails — and A-Frame silently never uploads the
    texture, leaving the portrait planes blank even though the PNGs
    exist on disk and are visible if you open them directly.
    Same-origin <img> loads work as untainted WebGL textures without
    the attribute, which is what we want here.

    timeout="3000": short cap so a slow PNG can't stall the
    'loaded' event for the original 10 s.
  -->
  <a-assets timeout="3000">
    <!-- ═══ GUARDIAN portrait (PNG with transparent background) ═══ -->
    <img id="tex-guardian" src="assets/guardian.png"/>

    <!-- Soft purple aura around the Guardian (auto-generated SVG) -->
    <img id="tex-guardian-aura" src='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 800"><defs><radialGradient id="ga" cx="50%" cy="40%"><stop offset="0%" stop-color="%23cc77ff" stop-opacity="0.6"/><stop offset="40%" stop-color="%238822dd" stop-opacity="0.3"/><stop offset="100%" stop-color="%23000000" stop-opacity="0"/></radialGradient></defs><ellipse cx="250" cy="320" rx="220" ry="380" fill="url(%23ga)"/></svg>'/>

    <!-- ═══ WANDERER portrait (PNG with transparent background) ═══ -->
    <img id="tex-wanderer" src="assets/wanderer.png"/>

    <!-- Soft blue aura around the Wanderer -->
    <img id="tex-wanderer-aura" src='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 800"><defs><radialGradient id="wa" cx="50%" cy="40%"><stop offset="0%" stop-color="%2377aaff" stop-opacity="0.6"/><stop offset="40%" stop-color="%232255cc" stop-opacity="0.3"/><stop offset="100%" stop-color="%23000000" stop-opacity="0"/></radialGradient></defs><ellipse cx="250" cy="320" rx="220" ry="380" fill="url(%23wa)"/></svg>'/>
  </a-assets>

  <!-- ── CAMERA RIG ── -->
  <a-entity id="rig">
    <a-camera id="cam"
      look-controls="pointerLockEnabled:false"
      wasd-controls="enabled:false"
      position="0 1.6 0">

      <!-- Gaze cursor (center dot + progress arc) -->
      <a-entity id="gaze-cursor" position="0 0 -1.8">
        <a-ring color="#ffffff" radius-inner="0.014" radius-outer="0.018"
          material="shader:flat; opacity:0.45; color:#ffffff">
        </a-ring>
        <a-torus id="gaze-arc" radius="0.026" radius-tubular="0.004"
          theta-length="0" color="#88ccff"
          material="shader:flat; emissive:#66aaff; emissiveIntensity:2; transparent:true; opacity:0; color:#88ccff"
          rotation="0 0 90">
        </a-torus>
      </a-entity>

      <!-- ── HUD SUBTITLE PANEL ──
           Single plane with a CanvasTexture painted at runtime.
           This avoids A-Frame <a-text>'s reliance on the Roboto MSDF
           font loaded from cdn.aframe.io, which silently fails to
           upload in Quest's immersive XR session and leaves the
           subtitle panel empty. Canvas-based text always renders. -->
      <a-entity id="hud" position="0 -0.32 -1.5" visible="false">
        <a-plane id="hud-plane" width="1.1" height="0.32"
          material="shader:flat; color:#ffffff; transparent:true; opacity:1; side:double">
        </a-plane>
      </a-entity>

    </a-camera>

    <!-- Hand tracking (Quest 3 optional) -->
    <a-entity hand-tracking-controls="hand:left" id="left-hand"></a-entity>
    <a-entity hand-tracking-controls="hand:right" id="right-hand"></a-entity>
  </a-entity>

  <!-- ══════════════════════════════════════════════════
       WORLD CONTENT
       All positioned relative to user's start (0,0,0).
       User is assumed to be standing ~1m from a real bookshelf.
       Shelf face is at z=-1.0. Content arranged along that plane.
  ══════════════════════════════════════════════════ -->

  <!-- ── AMBIENT FLOATING MOTES (always visible) ── -->
  <a-entity id="motes">
    <!-- Purple motes cluster near shelf left -->
    <a-sphere position="-0.45 1.5 -1.1" radius="0.009" color="#dd99ff"
      material="shader:flat; emissive:#cc77ff; emissiveIntensity:2.5; transparent:true; opacity:0.85"
      animation="property:position; from:-0.45 1.5 -1.1; to:-0.25 1.95 -0.9; dir:alternate; dur:4200; loop:true; easing:easeInOutSine">
    </a-sphere>
    <a-sphere position="-0.8 1.7 -1.15" radius="0.007" color="#cc88ff"
      material="shader:flat; emissive:#bb66ff; emissiveIntensity:2; transparent:true; opacity:0.75"
      animation="property:position; from:-0.8 1.7 -1.15; to:-0.6 2.2 -1.3; dir:alternate; dur:5100; loop:true; delay:800; easing:easeInOutSine">
    </a-sphere>
    <a-sphere position="-0.15 1.3 -1.2" radius="0.006" color="#ee88ff"
      material="shader:flat; emissive:#dd66ff; emissiveIntensity:2; transparent:true; opacity:0.7"
      animation="property:position; from:-0.15 1.3 -1.2; to:0.1 1.8 -1.0; dir:alternate; dur:3800; loop:true; delay:1400; easing:easeInOutSine">
    </a-sphere>
    <!-- Blue motes cluster right -->
    <a-sphere position="0.9 1.6 -1.1" radius="0.008" color="#88bbff"
      material="shader:flat; emissive:#6699ff; emissiveIntensity:2; transparent:true; opacity:0.8"
      animation="property:position; from:0.9 1.6 -1.1; to:1.1 2.1 -0.95; dir:alternate; dur:4600; loop:true; delay:600; easing:easeInOutSine">
    </a-sphere>
    <a-sphere position="1.2 1.2 -1.2" radius="0.006" color="#99ccff"
      material="shader:flat; emissive:#77aaff; emissiveIntensity:2; transparent:true; opacity:0.7"
      animation="property:position; from:1.2 1.2 -1.2; to:0.9 1.7 -1.05; dir:alternate; dur:3500; loop:true; delay:1100; easing:easeInOutSine">
    </a-sphere>
    <a-sphere position="0.5 2.0 -1.1" radius="0.007" color="#aaddff"
      material="shader:flat; emissive:#88bbff; emissiveIntensity:2; transparent:true; opacity:0.65"
      animation="property:position; from:0.5 2.0 -1.1; to:0.7 2.5 -1.3; dir:alternate; dur:5800; loop:true; delay:2000; easing:easeInOutSine">
    </a-sphere>
    <!-- Center motes -->
    <a-sphere position="0.1 1.9 -1.05" radius="0.005" color="#bbaaff"
      material="shader:flat; emissive:#9988ff; emissiveIntensity:2; transparent:true; opacity:0.6"
      animation="property:position; from:0.1 1.9 -1.05; to:0.35 2.35 -1.2; dir:alternate; dur:4900; loop:true; delay:1700; easing:easeInOutSine">
    </a-sphere>
    <a-sphere position="-0.3 0.95 -1.15" radius="0.006" color="#cc99ff"
      material="shader:flat; emissive:#bb77ff; emissiveIntensity:2; transparent:true; opacity:0.75"
      animation="property:position; from:-0.3 0.95 -1.15; to:-0.1 1.4 -0.95; dir:alternate; dur:4300; loop:true; delay:500; easing:easeInOutSine">
    </a-sphere>
  </a-entity>

  <!-- ── ACT 1: LIGHT RAYS FROM SHELF GAPS ── -->
  <a-entity id="rays">
    <!-- These fade in after ~10s via animation delay -->
    <a-plane width="0.009" height="1.4" color="#5500ee" position="-0.38 1.45 -0.995"
      rotation="0 0 4"
      material="shader:flat; emissive:#5500ee; emissiveIntensity:1.2; transparent:true; opacity:0"
      animation="property:material.opacity; from:0; to:0.14; dur:5000; delay:10000">
    </a-plane>
    <a-plane width="0.007" height="1.0" color="#7711ff" position="0.05 1.2 -0.995"
      rotation="0 0 -6"
      material="shader:flat; emissive:#7711ff; emissiveIntensity:1.2; transparent:true; opacity:0"
      animation="property:material.opacity; from:0; to:0.11; dur:4500; delay:13500">
    </a-plane>
    <a-plane width="0.008" height="1.2" color="#4400dd" position="-0.72 1.55 -0.995"
      rotation="0 0 8"
      material="shader:flat; emissive:#4400dd; emissiveIntensity:1; transparent:true; opacity:0"
      animation="property:material.opacity; from:0; to:0.16; dur:6000; delay:16000">
    </a-plane>
  </a-entity>

  <!-- ══════════════════════════════════════════════════
       GUARDIAN — Purple spirit billboard sprite
       Always faces camera. SVG portrait set via JS at runtime.
  ══════════════════════════════════════════════════ -->
  <a-entity id="guardian" visible="false" position="-0.55 1.4 -1.0" look-at-camera>
    <!-- Soft outer aura (rear plane, larger, blurred glow) -->
    <a-plane width="1.6" height="2.0" position="0 0 -0.02"
      material="shader:flat; src:#tex-guardian-aura; transparent:true; opacity:0.55; alphaTest:0.01"
      animation__pulse="property:material.opacity; from:0.4; to:0.7; dir:alternate; dur:2400; loop:true">
    </a-plane>
    <!-- Main character portrait -->
    <a-plane id="g-portrait" width="1.0" height="1.6" position="0 0 0"
      material="shader:flat; src:#tex-guardian; transparent:true; opacity:0.95; alphaTest:0.01"
      animation__float="property:position; from:0 -0.03 0; to:0 0.03 0; dir:alternate; dur:3200; loop:true; easing:easeInOutSine">
    </a-plane>
    <!-- Floating spirit orbs around guardian -->
    <a-sphere position="0.42 0.36 0.05" radius="0.026"
      material="shader:flat; emissive:#ee88ff; emissiveIntensity:2.5; color:#ee88ff; transparent:true; opacity:0.92"
      animation="property:position; from:0.42 0.36 0.05; to:0.5 0.62 0.12; dir:alternate; dur:3400; loop:true">
    </a-sphere>
    <a-sphere position="-0.46 0.28 -0.04" radius="0.02"
      material="shader:flat; emissive:#dd77ff; emissiveIntensity:2.5; color:#dd77ff; transparent:true; opacity:0.88"
      animation="property:position; from:-0.46 0.28 -0.04; to:-0.36 0.58 0.08; dir:alternate; dur:2800; loop:true; delay:600">
    </a-sphere>
    <a-sphere position="0.08 0.78 0.1" radius="0.018"
      material="shader:flat; emissive:#cc99ff; emissiveIntensity:2.5; color:#cc99ff; transparent:true; opacity:0.82"
      animation="property:position; from:0.08 0.78 0.1; to:0.22 1.0 -0.03; dir:alternate; dur:4100; loop:true; delay:1200">
    </a-sphere>
    <a-sphere position="-0.18 -0.18 0.12" radius="0.014"
      material="shader:flat; emissive:#bb88ff; emissiveIntensity:2; color:#bb88ff; transparent:true; opacity:0.75"
      animation="property:position; from:-0.18 -0.18 0.12; to:0.06 0.1 0.18; dir:alternate; dur:3700; loop:true; delay:900">
    </a-sphere>
  </a-entity>

  <!-- ══════════════════════════════════════════════════
       WANDERER — Blue spirit billboard sprite
  ══════════════════════════════════════════════════ -->
  <a-entity id="wanderer" visible="false" position="0.55 1.4 -0.85" look-at-camera>
    <!-- Soft outer aura -->
    <a-plane width="1.6" height="2.0" position="0 0 -0.02"
      material="shader:flat; src:#tex-wanderer-aura; transparent:true; opacity:0.55; alphaTest:0.01"
      animation__pulse="property:material.opacity; from:0.4; to:0.7; dir:alternate; dur:2400; loop:true; delay:380">
    </a-plane>
    <!-- Main character portrait -->
    <a-plane id="w-portrait" width="1.0" height="1.6" position="0 0 0"
      material="shader:flat; src:#tex-wanderer; transparent:true; opacity:0.95; alphaTest:0.01"
      animation__float="property:position; from:0 -0.03 0; to:0 0.03 0; dir:alternate; dur:3000; loop:true; easing:easeInOutSine; delay:200">
    </a-plane>
    <!-- Wanderer spirit orbs -->
    <a-sphere position="-0.42 0.36 0.05" radius="0.026"
      material="shader:flat; emissive:#88ccff; emissiveIntensity:2.5; color:#88ccff; transparent:true; opacity:0.92"
      animation="property:position; from:-0.42 0.36 0.05; to:-0.5 0.62 0.12; dir:alternate; dur:3100; loop:true">
    </a-sphere>
    <a-sphere position="0.44 0.3 -0.04" radius="0.02"
      material="shader:flat; emissive:#aaddff; emissiveIntensity:2.5; color:#aaddff; transparent:true; opacity:0.88"
      animation="property:position; from:0.44 0.3 -0.04; to:0.54 0.58 0.08; dir:alternate; dur:2600; loop:true; delay:550">
    </a-sphere>
    <a-sphere position="0.1 0.78 0.08" radius="0.018"
      material="shader:flat; emissive:#99bbff; emissiveIntensity:2.5; color:#99bbff; transparent:true; opacity:0.82"
      animation="property:position; from:0.1 0.78 0.08; to:-0.08 1.0 -0.04; dir:alternate; dur:3900; loop:true; delay:1000">
    </a-sphere>
  </a-entity>

  <!-- ══════════════════════════════════════════════════
       PURPLE ORBS (×3) — proximity / reach to collect
       Positioned ~50cm in front of user, eye-level.
       Pulled in close to fit narrow standing-reading aisle.
       Hand collect distance: 25cm (set in JS)
  ══════════════════════════════════════════════════ -->

  <!-- ══ YELLOW ORBS (x3) — 排球少年 · 上排书架 · hand touch ══ -->
  <a-entity id="porb0" class="purple-orb" visible="false" position="-0.28 2.00 -0.50">
    <a-sphere radius="0.016"
      material="shader:flat; emissive:#ddaa00; emissiveIntensity:2.0; color:#ffee44; transparent:true; opacity:0.96"
      animation="property:scale; from:0.82 0.82 0.82; to:1.2 1.2 1.2; dir:alternate; dur:1350; loop:true">
    </a-sphere>
    <a-sphere radius="0.028"
      material="shader:flat; emissive:#aa8800; emissiveIntensity:0.5; color:#ffdd22; transparent:true; opacity:0.18"
      animation="property:scale; from:0.78 0.78 0.78; to:1.28 1.28 1.28; dir:alternate; dur:2000; loop:true">
    </a-sphere>
    <a-sphere radius="0.008" position="0.016 0.016 0"
      material="shader:flat; emissive:#ffffff; emissiveIntensity:4; color:#ffffff; transparent:true; opacity:0.95">
    </a-sphere>
    <a-text value="排球少年" color="#ffee88" width="0.38" align="center"
      position="0 0.22 0" material="shader:flat">
    </a-text>
  </a-entity>

  <!-- porb1: upper shelf center -->
  <a-entity id="porb1" class="purple-orb" visible="false" position="0.02 2.00 -0.52">
    <a-sphere radius="0.016"
      material="shader:flat; emissive:#ddaa00; emissiveIntensity:2.0; color:#ffee44; transparent:true; opacity:0.96"
      animation="property:scale; from:0.82 0.82 0.82; to:1.2 1.2 1.2; dir:alternate; dur:1550; loop:true">
    </a-sphere>
    <a-sphere radius="0.028"
      material="shader:flat; emissive:#aa8800; emissiveIntensity:0.5; color:#ffdd22; transparent:true; opacity:0.18"
      animation="property:scale; from:0.78 0.78 0.78; to:1.28 1.28 1.28; dir:alternate; dur:2200; loop:true">
    </a-sphere>
    <a-sphere radius="0.008" position="0.016 0.016 0"
      material="shader:flat; emissive:#ffffff; emissiveIntensity:4; color:#ffffff; transparent:true; opacity:0.95">
    </a-sphere>
    <a-text value="排球少年" color="#ffee88" width="0.38" align="center"
      position="0 0.22 0" material="shader:flat">
    </a-text>
  </a-entity>

  <!-- porb2: upper shelf right -->
  <a-entity id="porb2" class="purple-orb" visible="false" position="0.28 2.00 -0.50">
    <a-sphere radius="0.016"
      material="shader:flat; emissive:#ddaa00; emissiveIntensity:2.0; color:#ffee44; transparent:true; opacity:0.96"
      animation="property:scale; from:0.82 0.82 0.82; to:1.2 1.2 1.2; dir:alternate; dur:1150; loop:true">
    </a-sphere>
    <a-sphere radius="0.028"
      material="shader:flat; emissive:#aa8800; emissiveIntensity:0.5; color:#ffdd22; transparent:true; opacity:0.18"
      animation="property:scale; from:0.78 0.78 0.78; to:1.28 1.28 1.28; dir:alternate; dur:1750; loop:true">
    </a-sphere>
    <a-sphere radius="0.008" position="0.016 0.016 0"
      material="shader:flat; emissive:#ffffff; emissiveIntensity:4; color:#ffffff; transparent:true; opacity:0.95">
    </a-sphere>
    <a-text value="排球少年" color="#ffee88" width="0.38" align="center"
      position="0 0.22 0" material="shader:flat">
    </a-text>
  </a-entity>

  <!-- ══════════════════════════════════════════════════
       PURPLE ORBS (x3) — JOJO · 中排书架 · hand touch (same as yellow)
  ══════════════════════════════════════════════════ -->

  <!-- borb0: middle shelf left -->
  <a-entity id="borb0" class="blue-orb" visible="false" position="-0.10 1.68 -0.55">
    <a-sphere radius="0.016"
      material="shader:flat; emissive:#9911ee; emissiveIntensity:1.8; color:#cc55ff; transparent:true; opacity:0.96"
      animation="property:scale; from:0.82 0.82 0.82; to:1.2 1.2 1.2; dir:alternate; dur:1400; loop:true">
    </a-sphere>
    <a-sphere radius="0.028"
      material="shader:flat; emissive:#7700cc; emissiveIntensity:0.5; color:#aa44ee; transparent:true; opacity:0.18"
      animation="property:scale; from:0.78 0.78 0.78; to:1.28 1.28 1.28; dir:alternate; dur:2100; loop:true">
    </a-sphere>
    <a-torus id="gring0" radius="0.08" radius-tubular="0.005" color="#dd88ff"
      theta-length="0" rotation="0 0 90"
      material="shader:flat; emissive:#bb55ff; emissiveIntensity:2.5; transparent:true; opacity:0; color:#dd88ff">
    </a-torus>
    <a-sphere radius="0.008" position="0.016 0.016 0"
      material="shader:flat; emissive:#ffffff; emissiveIntensity:4; color:#ffffff; transparent:true; opacity:0.95">
    </a-sphere>
    <a-text value="JOJO" color="#dd99ff" width="0.28" align="center"
      position="0 0.22 0" material="shader:flat">
    </a-text>
  </a-entity>

  <!-- borb1: middle shelf center -->
  <a-entity id="borb1" class="blue-orb" visible="false" position="0.12 1.68 -0.55">
    <a-sphere radius="0.016"
      material="shader:flat; emissive:#9911ee; emissiveIntensity:1.8; color:#cc55ff; transparent:true; opacity:0.96"
      animation="property:scale; from:0.82 0.82 0.82; to:1.2 1.2 1.2; dir:alternate; dur:1200; loop:true">
    </a-sphere>
    <a-sphere radius="0.028"
      material="shader:flat; emissive:#7700cc; emissiveIntensity:0.5; color:#aa44ee; transparent:true; opacity:0.18"

<script>

AFRAME.registerComponent('look-at-camera', {
  init: function () {
    this.cam = document.querySelector('[camera]');
    this._v = new THREE.Vector3();
  },
  tick: function () {
    if (!this.cam) {
      this.cam = document.querySelector('[camera]');
      if (!this.cam) return;
    }
    const camObj = this.cam.object3D;
    const myObj = this.el.object3D;
    camObj.getWorldPosition(this._v);
    // Only rotate around Y axis so character stays upright
    const dx = this._v.x - myObj.position.x;
    const dz = this._v.z - myObj.position.z;
    myObj.rotation.y = Math.atan2(dx, dz);
  }
});

// ────────────────────────────────────────────────

// ────────────────────────────────────────────────
// ENTRY POINT
// ────────────────────────────────────────────────
function enterAR() {
  document.getElementById('overlay').style.display = 'none';
  cacheDOM();
  D.hint.style.display = 'block';
  D.counter.style.display = 'block';
  D.hint.textContent = 'Entering experience…';

  // Wire up hand / controller input for orb collection
  setupInputBindings();

  // Build the canvas-backed subtitle texture before any dialogue runs.
  initHudCanvas();

  // Force the WebGL canvas to clear transparent IMMEDIATELY, before
  // the XR session starts. If we wait for 'enter-ar' the first frame
  // can paint opaque black over the passthrough.
  try {
    if (D.scene.renderer) {
      D.scene.renderer.setClearColor(new THREE.Color(0, 0, 0), 0);
      D.scene.renderer.setClearAlpha(0);
    }
  } catch(e) {}

  // ── Enter-XR event handlers ───────────────────
  function onEnterXR(evt) {
    window._arMode = (evt.type === 'enter-ar');
    // Re-force transparency once XR session is active — A-Frame can
    // reset clearAlpha during session setup on some builds.
    try {
      D.scene.renderer.setClearColor(new THREE.Color(0, 0, 0), 0);
      D.scene.renderer.setClearAlpha(0);
    } catch(e) {}
    D.hint.textContent = window._arMode
      ? 'Light is seeping through the shelves…'
      : 'VR mode (no passthrough)';
  }
  D.scene.addEventListener('enter-ar', onEnterXR, { once: true });
  D.scene.addEventListener('enter-vr', onEnterXR, { once: true });
  D.scene.addEventListener('exit-ar', () => { window._arMode = false; });
  D.scene.addEventListener('exit-vr', () => { window._arMode = false; });

  // ── Tick binding & experience start ──────────
  if (D.scene.hasLoaded) bindTick();
  else D.scene.addEventListener('loaded', bindTick, { once: true });
  setTimeout(startExperience, 3500);

  // ── XR session entry ─────────────────────────
  // No WebXR at all → desktop preview
  if (!navigator.xr) { enableDesktopMode(); return; }

  // CRITICAL: enterAR() must be called DIRECTLY from the click handler
  // with NO await/Promise before it, or the browser drops the
  // user-gesture token and silently refuses the session request.
  try {
    const arEntry = typeof D.scene.enterAR === 'function'
      ? D.scene.enterAR()                 // A-Frame 1.4+ — immersive-ar
      : null;

    if (arEntry && typeof arEntry.then === 'function') {
      arEntry
        .then(() => {
          // Belt and braces — set transparent again post-entry.
          try {
            D.scene.renderer.setClearColor(new THREE.Color(0, 0, 0), 0);
            D.scene.renderer.setClearAlpha(0);
          } catch(e) {}
        })
        .catch(arErr => {
          console.warn('AR entry failed:', arErr);
          // IMPORTANT: do NOT fall back to enterVR() here. On Quest,
          // immersive-vr has NO passthrough, so the user just sees
          // the two characters floating in a black void — which is
          // exactly the bug we're fixing. Desktop preview is more
          // useful as a graceful failure state, and it tells the
          // user clearly that AR didn't start.
          D.hint.textContent =
            'AR unavailable on this browser — using preview mode';
          enableDesktopMode();
        });
    } else {
      // enterAR isn't a function (very old A-Frame) → preview only.
      enableDesktopMode();
    }
  } catch (err) {
    console.warn('XR entry threw synchronously:', err);
    enableDesktopMode();
  }
}
function enableDesktopMode() {
  if (window._desktopMode) return;
  window._desktopMode = true;
  // alpha:true = canvas is transparent, so styling the body shows through
  document.body.style.background =
    'radial-gradient(ellipse at 50% 30%, #1a004d 0%, #08001a 55%, #000 100%)';
  D.hint.textContent = '💻 Desktop preview · drag mouse · click orbs to collect';
  // Enable mouse look-controls for desktop preview so users can see characters
  if (D.cam) {
    D.cam.setAttribute('look-controls', 'pointerLockEnabled:false; reverseMouseDrag:false');
  }
  // Add cursor that detects clicks on orbs in desktop mode
  if (!document.getElementById('desktop-cursor')) {
    const cursor = document.createElement('a-entity');
    cursor.setAttribute('id', 'desktop-cursor');
    cursor.setAttribute('cursor', 'rayOrigin: mouse');
    cursor.setAttribute('raycaster', 'objects: .purple-orb, .blue-orb, .red-orb; far: 5');
    D.scene.appendChild(cursor);
  }
  // Wire orb click → collect
  [...D.porbs, ...D.borbs, ...D.rorbs].forEach((orb) => {
    orb.addEventListener('click', () => {
      if (!waitCollect) return;
      if (collectType === 'purple' && orb.classList.contains('purple-orb') && D.porbs[collectIdx] === orb) {
        fireCollect();
      } else if (collectType === 'blue' && orb.classList.contains('blue-orb') && D.borbs[collectIdx] === orb) {
        fireCollect();
      } else if (collectType === 'red' && orb.classList.contains('red-orb') && D.rorbs[collectIdx] === orb) {
        fireCollect();
      }
    });
  });
}

function bindTick() {
  if (tickBound) return;
  tickBound = true;
  // FIX: A-Frame's <a-scene> does NOT emit a DOM 'tick' event.
  // tick() is a component-level lifecycle callback, so we register a
  // tiny component on the scene whose tick() forwards to onTick().
  // Without this, proximity / gaze detection never fires and orb
  // collection only advances via the 12 s auto-advance fallback.
  D.scene.setAttribute('xp-tick', '');
}

// ────────────────────────────────────────────────
// INPUT BINDINGS — three.js WebXR hand + controller poses
// ────────────────────────────────────────────────
//
// A-Frame's hand-tracking-controls component does NOT sync hand pose
// onto the entity's object3D — it only renders a hand mesh. So reading
// `D.leftHand.object3D.position` always returned (0,0,0) and our
// detection silently failed every frame.
//
// The correct path is three.js's WebXRManager:
//   renderer.xr.getHand(i)          → THREE.Group with .joints[]
//                                     where each joint is a Group
//                                     positioned every XR frame.
//   renderer.xr.getControllerGrip(i) → grip-space Group for hand
//                                     controllers (Quest Touch etc.)
//
// We pre-fetch indices 0 and 1, since the user could be holding either
// hand controller or using bare hands (hand tracking enabled in Quest
// settings). We poll all four objects every tick and collect any that
// have a valid (non-origin) world position.
function setupInputBindings() {
  if (window._inputBound) return;
  window._inputBound = true;

  // Pre-fetch three.js XR input groups. These work whether or not the
  // session has started yet; three.js fills them in once it does.
  function bindXRInputs() {
    const renderer = D.scene && D.scene.renderer;
    if (!renderer || !renderer.xr) return;
    if (window._xrInputsBound) return;
    window._xrInputsBound = true;

    window._xrHand0 = renderer.xr.getHand(0);
    window._xrHand1 = renderer.xr.getHand(1);
    window._xrGrip0 = renderer.xr.getControllerGrip(0);
    window._xrGrip1 = renderer.xr.getControllerGrip(1);
    window._xrCtrl0 = renderer.xr.getController(0);
    window._xrCtrl1 = renderer.xr.getController(1);

    // Trigger / select-start on a controller fires an immediate collect
    [window._xrCtrl0, window._xrCtrl1].forEach((c) => {
      if (!c) return;
      c.addEventListener('selectstart', () => tryHandCollect());
    });

    // Also bind pinch events from A-Frame's hand-tracking-controls as
    // a redundant signal — works on builds where the component DOES
    // emit them, harmless when it doesn't.
    ['leftHand', 'rightHand'].forEach(key => {
      const el = D[key];
      if (!el) return;
      el.addEventListener('pinchstarted', () => tryHandCollect());
      el.addEventListener('triggerdown', () => tryHandCollect());
    });
  }

  if (D.scene.hasLoaded) bindXRInputs();
  else D.scene.addEventListener('loaded', bindXRInputs, { once: true });
  // Also retry on session entry — sometimes renderer.xr isn't ready until then
  D.scene.addEventListener('enter-vr', bindXRInputs);
  D.scene.addEventListener('enter-ar', bindXRInputs);
}

// Reusable scratch vector to avoid allocating per frame
const _scratchVec = new THREE.Vector3();

// Collect all currently-tracked input world positions (hands + controllers).
// `out` array is filled with THREE.Vector3 instances.
function gatherInputPositions(out) {
  out.length = 0;

  // Hand joints — preferred (more precise than controller grip)
  [window._xrHand0, window._xrHand1].forEach(h => {
    if (!h || !h.joints) return;
    // Index fingertip is the natural "poke" point
    const tip = h.joints['index-finger-tip'];
    if (tip) {
      const v = new THREE.Vector3();
      tip.getWorldPosition(v);
      if (v.lengthSq() > 0.0001) out.push(v);
    }
    // Thumb tip too — gives a second reachable point per hand
    const thumb = h.joints['thumb-tip'];
    if (thumb) {
      const v = new THREE.Vector3();
      thumb.getWorldPosition(v);
      if (v.lengthSq() > 0.0001) out.push(v);
    }
    // Wrist as a larger fallback target
    const wrist = h.joints['wrist'];
    if (wrist) {
      const v = new THREE.Vector3();
      wrist.getWorldPosition(v);
      if (v.lengthSq() > 0.0001) out.push(v);
    }
  });

  // Controllers (Quest Touch etc.) — used when hands aren't tracked
  [window._xrGrip0, window._xrGrip1].forEach(c => {
    if (!c) return;
    const v = new THREE.Vector3();
    c.getWorldPosition(v);
    if (v.lengthSq() > 0.0001) out.push(v);
  });
}

// Try to collect the active orb. Used by event-driven inputs (trigger,
// pinch) — instantly evaluates current input positions.
const _inputBuf = [];
function tryHandCollect() {
  if (!waitCollect) return;
  const orb = collectType === 'purple' ? D.porbs[collectIdx]
            : collectType === 'blue'   ? D.borbs[collectIdx]
            :                            D.rorbs[collectIdx];
  if (!orb || !orb.getAttribute('visible')) return;

  orb.object3D.getWorldPosition(_v3b);
  gatherInputPositions(_inputBuf);

  for (const p of _inputBuf) {
    if (p.distanceTo(_v3b) < HAND_COLLECT_DIST) {
      fireCollect();
      return;
    }
  }
}

AFRAME.registerComponent('xp-tick', {
  tick: function () { onTick(); }
});

// ── Helper: get orb entity by zone name and index ──
function getOrbEl(zone, idx) {
  if (zone === 'yellow') return D.porbs[idx];
  if (zone === 'blue')   return D.borbs[idx];
  return D.rorbs[idx];
}

// ── Helper: get collectType string from zone name ──
function zoneToCollectType(zone) {
  if (zone === 'yellow') return 'purple';
  if (zone === 'blue')   return 'blue';
  return 'red';
}

// ── Zone activation — called when hand detected near a zone ──
// Loops through ALL remaining orbs in the zone automatically,
// so no re-detection is needed between orbs.
async function activateZone(zone) {
  if (zoneBusy || phase !== 'act3') return;
  if (zoneProgress[zone] >= 3) return;

  zoneBusy = true;

  // ── FIRST ENTRY: lock in the zone, hide ALL shelf guide glows ──
  if (activeZone === null) {
    activeZone = zone;
    D.guideYellow.setAttribute('visible', false);
    D.guideBlue.setAttribute('visible', false);
    D.guideRed.setAttribute('visible', false);
    const shelfNames = { yellow: '🟡 上排·排球少年', blue: '🟣 中排·JOJO', red: '🔴 下排·王者天下' };
    D.hint.textContent = `${shelfNames[zone]} — 专注收集这一排的全部记忆`;
    await sleep(600);
  }

  // Ensure this zone's guide glow stays hidden while active
  const guideEl = zone === 'yellow' ? D.guideYellow
                : zone === 'blue'   ? D.guideBlue
                :                     D.guideRed;
  guideEl.setAttribute('visible', false);

  const emoji = zone === 'yellow' ? '🟡' : zone === 'blue' ? '🟣' : '🔴';

  // ── INNER LOOP: collect all remaining orbs in this zone sequentially ──
  // This avoids relying on tickZoneDetection to re-fire between orbs,
  // which fails in desktop mode (no hands) and is fragile in AR.
  while (zoneProgress[zone] < 3) {
    const orbIdx  = zoneProgress[zone];
    const orbData = ZONES[zone].orbs[orbIdx];

    // Guardian/Wanderer describes the physical book
    await playLine(orbData.before);

    // Orb appears from the shelf
    const orbEl = getOrbEl(zone, orbIdx);
    orbEl.setAttribute('visible', true);

    // Set up collection gate
    collectType = zoneToCollectType(zone);
    collectIdx  = orbIdx;
    waitCollect = true;
    D.hint.textContent = `${emoji} Reach into the glow to collect the memory`;

    await new Promise(res => { onCollect = res; });
    waitCollect = false;

    // Flash + hide orb
    const flashPos = new THREE.Vector3();
    orbEl.object3D.getWorldPosition(flashPos);
    orbEl.object3D.scale.set(1, 1, 1);   // reset proximity-feedback scale
    orbProxFeedbackT = 0;
    orbEl.setAttribute('visible', false);

    if (zone === 'yellow') purpleCount++;
    else if (zone === 'blue') blueCount++;
    else redCount++;
    updateCounter();

    spawnCollectFlash(collectType, flashPos);
    await sleep(500);

    // Reflection line after collection
    await playLine(orbData.after);
    if (orbData.after.followup) {
      await sleep(700);
      await playLine(orbData.after.followup);
    }

    zoneProgress[zone]++;
    totalCollected++;

    // Show progress hint between orbs (if more remain in this zone)
    if (zoneProgress[zone] < 3) {
      D.hint.textContent = `${emoji} 还剩 ${3 - zoneProgress[zone]} 个记忆…`;
      await sleep(800);
    }
  }

  // ── ZONE COMPLETE: unlock so user can freely choose another shelf ──
  activeZone = null;
  const completedCount = Object.values(zoneProgress).filter(v => v >= 3).length;
  if (completedCount < 3) {
    const remaining = ['yellow', 'blue', 'red'].filter(z => zoneProgress[z] < 3);
    remaining.forEach(z => {
      const el = z === 'yellow' ? D.guideYellow : z === 'blue' ? D.guideBlue : D.guideRed;
      el.setAttribute('visible', true);
    });
    const leftCount = 3 - completedCount;
    D.hint.textContent = `✦ 还有 ${leftCount} 排书架等待探索 — 伸手选择下一排`;
    await sleep(400);
  }

  zoneBusy = false;

  // All 9 collected → trigger act4
  if (totalCollected >= 9 && window._act3Done) {
    const cb = window._act3Done;
    window._act3Done = null;
    cb();
  }
}

// ────────────────────────────────────────────────
// TICK — proximity + gaze detection
// ────────────────────────────────────────────────
let _lastTick = 0;
const _v3a = new THREE.Vector3();
const _v3b = new THREE.Vector3();
const _v3c = new THREE.Vector3();

function onTick() {
  const now = Date.now();
  if (now - _lastTick < 60) return;   // ~16fps check
  _lastTick = now;

  const camObj = D.cam.object3D;
  if (!camObj) return;

  // During orb collection phase: proximity detection
  if (waitCollect) {
    tickProximity(camObj);
    return;
  }

  // During act3 and not busy: zone detection via hand position
  if (phase === 'act3' && !zoneBusy) {
    tickZoneDetection();
  }
}

const HAND_COLLECT_DIST = 0.40;   // 40cm — hand tip / controller within this triggers grab (was 25cm)
const HAND_FEEDBACK_DIST = 0.70;  // start visual highlight when hand within 70cm (was 55cm)

function tickProximity(camObj) {
  const orb = collectType === 'purple' ? D.porbs[collectIdx]
            : collectType === 'blue'   ? D.borbs[collectIdx]
            :                            D.rorbs[collectIdx];
  if (!orb || !orb.getAttribute('visible')) return;

  orb.object3D.getWorldPosition(_v3b);

  // Pull every tracked input position (hand joints + controller grips)
  gatherInputPositions(_inputBuf);

  let bestDist = Infinity;
  for (const p of _inputBuf) {
    const d = p.distanceTo(_v3b);
    if (d < bestDist) bestDist = d;
  }

  // ── Visual feedback as hand approaches ─────────────────────────
  applyOrbProximityFeedback(orb, bestDist);

  const emoji = collectType === 'purple' ? '🟡' : collectType === 'blue' ? '🟣' : '🔴';
  const label = collectType === 'purple' ? '排球少年' : collectType === 'blue' ? 'JOJO' : '王者天下';
  if (D.hint && _inputBuf.length > 0) {
    const distCm = (bestDist * 100).toFixed(0);
    const bar = bestDist < HAND_COLLECT_DIST ? '✅ 触发中！' : `距离 ${distCm} cm（需 <${(HAND_COLLECT_DIST*100).toFixed(0)}）`;
    D.hint.textContent = `${emoji} ${label} — ${bar}`;
  } else if (D.hint) {
    D.hint.textContent = `${emoji} ${label} — 未检测到手部，请确保双手在 Quest 视野内`;
  }

  // ── Trigger collection on touch ───────────────────────────────
  if (bestDist < HAND_COLLECT_DIST) {
    fireCollect();
  }
}

// ── Zone detection: user touches a guide glow orb to select a shelf ──
// Same proximity logic as orb collection — no Y-band or Z-threshold needed.
let _lastZoneCheck = 0;
function tickZoneDetection() {
  const now = Date.now();
  if (now - _lastZoneCheck < 60) return;
  _lastZoneCheck = now;

  gatherInputPositions(_inputBuf);
  if (_inputBuf.length === 0) {
    if (D.hint) D.hint.textContent = '✦ 伸手触碰书架前的光粒来选择书架';
    return;
  }

  // Check each guide glow for proximity
  const guides = [
    { zone: 'yellow', el: D.guideYellow },
    { zone: 'blue',   el: D.guideBlue   },
    { zone: 'red',    el: D.guideRed    },
  ];

  let closestZone = null;
  let closestDist = Infinity;

  for (const { zone, el } of guides) {
    if (!el || !el.getAttribute('visible')) continue;
    if (zoneProgress[zone] >= 3) continue;
    if (activeZone !== null && zone !== activeZone) continue;

    el.object3D.getWorldPosition(_v3b);
    for (const p of _inputBuf) {
      const d = p.distanceTo(_v3b);
      if (d < closestDist) { closestDist = d; closestZone = zone; }
    }
  }

  // Update hint with closest distance so user knows how close they are
  if (closestZone) {
    const emoji = closestZone === 'yellow' ? '🟡' : closestZone === 'blue' ? '🟣' : '🔴';
    const name  = closestZone === 'yellow' ? '排球少年' : closestZone === 'blue' ? 'JOJO' : '王者天下';
    if (closestDist < HAND_COLLECT_DIST) {
      if (D.hint) D.hint.textContent = `${emoji} 触碰 ${name}！`;
      activateZone(closestZone);
    } else {
      if (D.hint) D.hint.textContent = `${emoji} ${name} — 距离 ${(closestDist * 100).toFixed(0)} cm（需 <${(HAND_COLLECT_DIST * 100).toFixed(0)}）`;
    }
  } else {
    if (D.hint) D.hint.textContent = '✦ 伸手触碰书架前的光粒来选择书架';
  }
}
// Uses the orb entity's first child <a-sphere> (the inner core)
// scale as a quick visual "magnet" cue.
function applyOrbProximityFeedback(orb, dist) {
  const t = dist > HAND_FEEDBACK_DIST
    ? 0
    : 1 - (dist - HAND_COLLECT_DIST) / (HAND_FEEDBACK_DIST - HAND_COLLECT_DIST);
  const clamped = Math.max(0, Math.min(1, t));
  if (Math.abs(clamped - orbProxFeedbackT) < 0.02) return;
  orbProxFeedbackT = clamped;

  // Scale entire orb entity 1.0 → 1.35 as hand approaches
  const s = 1 + clamped * 0.35;
  orb.object3D.scale.set(s, s, s);
}

const GAZE_ANGLE_DEG = 9;
const GAZE_DURATION  = 2000;

function tickGaze(camObj) {
  if (!gazeOrbEl) return;

  camObj.getWorldPosition(_v3a);
  camObj.getWorldDirection(_v3c);
  gazeOrbEl.object3D.getWorldPosition(_v3b);

  // ── Allow blue orbs to ALSO be collected by hand touch ────────
  // (cheap, non-exclusive — gaze still works as the primary path)
  gatherInputPositions(_inputBuf);
  for (const p of _inputBuf) {
    if (p.distanceTo(_v3b) < HAND_COLLECT_DIST) {
      fireCollect();
      return;
    }
  }

  const toOrb = _v3b.clone().sub(_v3a).normalize();
  const dot = _v3c.dot(toOrb);
  const angleDeg = Math.acos(Math.max(-1, Math.min(1, dot))) * (180 / Math.PI);

  if (angleDeg < GAZE_ANGLE_DEG) {
    const now = Date.now();
    if (!gazeStart) gazeStart = now;
    const elapsed = now - gazeStart;
    const t = Math.min(elapsed / GAZE_DURATION, 1);

    // Update gaze ring on the orb
    if (gazeRingEl) {
      gazeRingEl.setAttribute('theta-length', t * 360);
      gazeRingEl.setAttribute('material',
        `shader:flat; emissive:#66bbff; emissiveIntensity:2.5; transparent:true; opacity:${0.3 + t * 0.7}; color:#88ddff`);
    }
    // Update HUD gaze arc
    D.gazeArc.setAttribute('theta-length', t * 360);
    D.gazeArc.setAttribute('material',
      `shader:flat; emissive:#66aaff; emissiveIntensity:2; transparent:true; opacity:${t * 0.85}; color:#88ccff`);

    if (D.hint) {
      D.hint.textContent = `🔵 Hold gaze… ${Math.round(t * 100)}%`;
    }

    if (t >= 1) fireCollect();
  } else {
    // Reset
    if (gazeStart) {
      gazeStart = 0;
      if (gazeRingEl) {
        gazeRingEl.setAttribute('theta-length', 0);
        gazeRingEl.setAttribute('material', 'transparent:true; opacity:0');
      }
      D.gazeArc.setAttribute('theta-length', 0);
      D.gazeArc.setAttribute('material', 'transparent:true; opacity:0');
    }
    if (D.hint) {
      D.hint.textContent =
        `🔵 Look at the blue orb · angle ${angleDeg.toFixed(0)}° (need <${GAZE_ANGLE_DEG}°)`;
    }
  }
}

function fireCollect() {
  if (!onCollect) return;
  const cb = onCollect;
  onCollect = null;
  waitCollect = false;
  // Reset gaze arc
  D.gazeArc.setAttribute('theta-length', 0);
  D.gazeArc.setAttribute('material', 'transparent:true; opacity:0');
  cb();
}

function resetGazeRing(idx) {
  const r = D.grings[idx];
  if (!r) return;
  r.setAttribute('theta-length', 0);
  r.setAttribute('material', 'transparent:true; opacity:0');
}

// ────────────────────────────────────────────────
// DIALOGUE / HUD — canvas-textured subtitle panel
// ────────────────────────────────────────────────
//
// We paint the entire subtitle (background + accent bar + speaker
// name + dialogue text) into an offscreen 2D canvas, then upload
// that canvas as a THREE.CanvasTexture onto the #hud-plane mesh.
//
// Why not <a-text>? A-Frame's text component fetches a Roboto MSDF
// JSON+PNG from cdn.aframe.io. In Quest's immersive XR session this
// fetch sometimes never completes (or the texture upload silently
// fails), leaving the subtitle panel rendered but with NO visible
// glyphs. CanvasTexture has no async font dependency — once the 2D
// context paints, the next frame uploads the new pixels. Reliable.
//
let dlgCanvas, dlgCtx, dlgTexture;
let _hudMaterialApplied = false;

function initHudCanvas() {
  dlgCanvas = document.createElement('canvas');
  dlgCanvas.width  = 1100;   // matches plane aspect 1.1 / 0.32 ≈ 3.44
  dlgCanvas.height = 320;
  dlgCtx = dlgCanvas.getContext('2d');
  dlgCtx.clearRect(0, 0, dlgCanvas.width, dlgCanvas.height);

  dlgTexture = new THREE.CanvasTexture(dlgCanvas);
  if ('SRGBColorSpace' in THREE) {
    dlgTexture.colorSpace = THREE.SRGBColorSpace;   // r152+ colour mgmt
  } else if ('sRGBEncoding' in THREE) {
    dlgTexture.encoding = THREE.sRGBEncoding;       // older three.js
  }
  dlgTexture.minFilter = THREE.LinearFilter;
  dlgTexture.magFilter = THREE.LinearFilter;
  dlgTexture.needsUpdate = true;

  applyHudMaterial();
}

function applyHudMaterial() {
  if (_hudMaterialApplied) return;
  const plane = D.hudPlane;
  if (!plane) return;
  const mesh = plane.getObject3D('mesh');
  if (!mesh) {
    // Mesh not built yet — try again on the next frame / loaded event.
    plane.addEventListener('loaded', applyHudMaterial, { once: true });
    setTimeout(applyHudMaterial, 80);
    return;
  }
  mesh.material = new THREE.MeshBasicMaterial({
    map: dlgTexture,
    transparent: true,
    side: THREE.DoubleSide,
    depthWrite: false
  });
  _hudMaterialApplied = true;
}

function drawDialog(name, text, isG) {
  const W = dlgCanvas.width, H = dlgCanvas.height;
  const ctx = dlgCtx;

  ctx.clearRect(0, 0, W, H);

  // Background panel — dark purple, mostly opaque
  ctx.fillStyle = 'rgba(6, 0, 26, 0.92)';
  ctx.fillRect(0, 0, W, H);

  // Subtle inner border for definition
  ctx.strokeStyle = 'rgba(120, 80, 200, 0.28)';
  ctx.lineWidth = 2;
  ctx.strokeRect(8, 8, W - 16, H - 16);

  // Left accent bar — colour per speaker
  const barColor = isG ? '#9922ff' : '#2255ff';
  ctx.fillStyle = barColor;
  ctx.fillRect(0, 0, 18, H);

  // Soft glow falling off to the right of the bar
  const glow = ctx.createLinearGradient(18, 0, 90, 0);
  glow.addColorStop(0, isG ? 'rgba(153, 34, 255, 0.45)'
                           : 'rgba(34, 85, 255, 0.45)');
  glow.addColorStop(1, 'rgba(0, 0, 0, 0)');
  ctx.fillStyle = glow;
  ctx.fillRect(18, 0, 72, H);

  // All text is horizontally centred
  const cx = W / 2;

  // Speaker name (centred)
  ctx.font = 'bold 36px Georgia, "Times New Roman", serif';
  ctx.fillStyle = isG ? '#cc88ff' : '#88bbff';
  ctx.textBaseline = 'top';
  ctx.textAlign = 'center';
  ctx.fillText(name, cx, 28);

  // Underline beneath speaker name (centred under the name)
  const nameWidth = ctx.measureText(name).width;
  ctx.fillStyle = isG ? 'rgba(204, 136, 255, 0.45)'
                      : 'rgba(136, 187, 255, 0.45)';
  ctx.fillRect(cx - nameWidth / 2, 78, nameWidth, 2);

  // Dialogue text — supports \n line breaks already in SCRIPT
  ctx.font = '32px Georgia, "Times New Roman", serif';
  ctx.fillStyle = '#e8ddff';
  ctx.textAlign = 'center';
  const lines = text.split('\n');
  // Vertically centre the dialogue block within the lower portion
  const lineHeight = 46;
  const blockHeight = lines.length * lineHeight;
  const dialogueAreaTop = 110;
  const dialogueAreaBottom = H - 20;
  const startY = dialogueAreaTop + ((dialogueAreaBottom - dialogueAreaTop) - blockHeight) / 2;
  let y = startY;
  for (const line of lines) {
    ctx.fillText(line, cx, y);
    y += lineHeight;
  }

  dlgTexture.needsUpdate = true;
  // In case material wasn't ready at init, try again now.
  if (!_hudMaterialApplied) applyHudMaterial();
}

function playLine(line) {
  return new Promise(resolve => {
    const isG = line.spkr === 'g';
    const name = line.name || (isG ? 'Guardian' : 'Wanderer');
    drawDialog(name, line.txt, isG);
    D.hud.setAttribute('visible', true);

    const dur = line.dur || Math.max(3500, line.txt.length * 95);
    if (dlgTimer) clearTimeout(dlgTimer);
    dlgTimer = setTimeout(() => {
      hideHUD();
      resolve();
    }, dur);
  });
}

async function playLines(lines) {
  for (const l of lines) {
    await playLine(l);
    await sleep(600);
  }
}

function hideHUD() {
  D.hud.setAttribute('visible', false);
}

// ────────────────────────────────────────────────
// VFX HELPERS
// ────────────────────────────────────────────────
function spawnCollectFlash(type, worldPos) {
  const color   = type === 'purple' ? '#ffee44'
                : type === 'blue'   ? '#dd77ff'
                :                     '#ff5533';        // red
  const emissive = type === 'purple' ? '#ffcc00'
                 : type === 'blue'   ? '#cc55ff'
                 :                     '#dd1100';       // red
  const flash = document.createElement('a-sphere');
  flash.setAttribute('radius', '0.18');
  flash.setAttribute('material',
    `shader:flat; emissive:${emissive}; emissiveIntensity:3; transparent:true; opacity:0.88; color:${color}`);

  // Spawn at the orb's world position so the burst feels like it comes
  // FROM the thing the user just touched — not from inside their face.
  // Falls back to a position in front of the camera if no position given.
  if (worldPos) {
    flash.setAttribute('position',
      `${worldPos.x.toFixed(3)} ${worldPos.y.toFixed(3)} ${worldPos.z.toFixed(3)}`);
    flash.setAttribute('animation',
      'property:scale; from:1 1 1; to:2.4 2.4 2.4; dur:700; easing:easeOutCubic');
    flash.setAttribute('animation__fade',
      'property:material.opacity; from:0.88; to:0; dur:700; easing:easeOutCubic');
    D.scene.appendChild(flash);
  } else {
    flash.setAttribute('position', '0 -0.1 -0.5');
    flash.setAttribute('animation',
      'property:material.opacity; from:0.88; to:0; dur:700; easing:easeOutCubic');
    D.cam.appendChild(flash);
  }
  setTimeout(() => flash.remove(), 800);
}

function fadeEntity(entity, duration) {
  entity.querySelectorAll('[material]').forEach(el => {
    const existing = el.getAttribute('material');
    el.setAttribute('animation__fade',
      `property:material.opacity; to:0; dur:${duration}; easing:easeInCubic`);
  });
  setTimeout(() => entity.setAttribute('visible', false), duration + 100);
}

function animLight(el, targetIntensity, dur) {
  el.setAttribute('animation',
    `property:intensity; from:0; to:${targetIntensity}; dur:${dur}; easing:easeOutCubic`);
}

function updateCounter() {
  D.counter.textContent = `🟡 ${purpleCount}/3 排球   🟣 ${blueCount}/3 JOJO   🔴 ${redCount}/3 天下`;
}

// ────────────────────────────────────────────────
// UTILITY
// ────────────────────────────────────────────────
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
