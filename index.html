<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Library Guardians · AR Experience</title>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }

/* ─── Landing Overlay ─── */
#overlay {
  position:fixed; inset:0; z-index:999;
  background: radial-gradient(ellipse at 40% 50%, #120026 0%, #05000f 60%, #000 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-family: 'Georgia', serif;
}
.star { position:absolute; border-radius:50%; background:#fff; pointer-events:none; }
#overlay h1 {
  font-size:2.4em; letter-spacing:0.15em; margin-bottom:10px;
  background: linear-gradient(135deg, #cc88ff, #ffffff, #88bbff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  text-shadow: none; filter: drop-shadow(0 0 20px #8844ff88);
}
#overlay .sub {
  color:#7766aa; font-size:0.85em; letter-spacing:0.3em;
  margin-bottom:40px; text-transform:uppercase;
}
#overlay .instructions {
  color:#665588; font-size:0.82em; line-height:2.2;
  text-align:center; margin-bottom:40px;
  border:1px solid #331155; padding:18px 30px; border-radius:12px;
  background:rgba(30,0,50,0.5);
}
#overlay .instructions span { color:#aa88dd; }
#btn {
  background: linear-gradient(135deg, #3a0075, #7700cc);
  border: 1.5px solid #bb55ff;
  color:#fff; font-size:1.05em; letter-spacing:0.2em;
  padding:16px 44px; border-radius:10px; cursor:pointer;
  box-shadow: 0 0 40px #6600aa66, inset 0 0 20px #ffffff08;
  transition: box-shadow 0.3s, transform 0.2s;
  font-family: 'Georgia', serif;
}
#btn:hover { box-shadow: 0 0 60px #9922ffaa; transform:scale(1.03); }
#btn:active { transform:scale(0.98); }

/* ─── HUD (camera-space subtitle) ─── */
/* Handled via A-Frame entities below */

/* ─── Debug hint bar ─── */
#hint {
  position:fixed; bottom:20px; left:50%;
  transform:translateX(-50%); white-space:nowrap;
  background:rgba(0,0,10,0.75); color:#9988cc;
  border:1px solid #222244; border-radius:20px;
  padding:8px 20px; font-size:0.78em;
  z-index:10; pointer-events:none; display:none;
  font-family: monospace;
}
#orb-counter {
  position:fixed; top:16px; right:16px;
  background:rgba(0,0,10,0.7); color:#aa88dd;
  border-radius:12px; padding:6px 14px;
  font-size:0.75em; font-family:monospace;
  z-index:10; pointer-events:none; display:none;
  border:1px solid #333;
}
</style>
</head>
<body>

<!-- ════════════════ LANDING SCREEN ════════════════ -->
<div id="overlay">
  <h1>Library Guardians</h1>
  <div class="sub">A Mixed-Reality Performance</div>
  <div class="instructions">
    <span>① Stand about 1m in front of a bookshelf</span><br>
    <span>② Put on your Meta Quest 3</span><br>
    <span>③ Open this page in the Quest browser (<b style="color:#ee99ff">HTTPS</b> required)</span><br>
    <span>④ Tap the button below to begin</span><br>
    <span style="color:#554477; font-size:0.85em">💻 On desktop: preview mode (no AR)</span>
  </div>
  <button id="btn" onclick="enterAR()">✦ Begin Experience ✦</button>
</div>

<div id="hint"></div>
<div id="orb-counter">🟣 0/3 &nbsp;&nbsp; 🔵 0/3</div>

<!-- ════════════════ A-FRAME SCENE ════════════════ -->
<a-scene
  id="scene"
  webxr="requiredFeatures: local-floor; optionalFeatures: dom-overlay, hand-tracking, bounded-floor"
  renderer="antialias:true; alpha:true; colorManagement:true"
  vr-mode-ui="enabled:true; enterARButton: #btn-fallback-ar"
  device-orientation-permission-ui="enabled:false"
  background="transparent: true">

  <a-assets timeout="10000">
    <!-- ═══ GUARDIAN portrait (PNG with transparent background) ═══ -->
    <img id="tex-guardian" crossorigin="anonymous" src="assets/guardian.png"/>

    <!-- Soft purple aura around the Guardian (auto-generated SVG) -->
    <img id="tex-guardian-aura" crossorigin="anonymous" src='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 800"><defs><radialGradient id="ga" cx="50%" cy="40%"><stop offset="0%" stop-color="%23cc77ff" stop-opacity="0.6"/><stop offset="40%" stop-color="%238822dd" stop-opacity="0.3"/><stop offset="100%" stop-color="%23000000" stop-opacity="0"/></radialGradient></defs><ellipse cx="250" cy="320" rx="220" ry="380" fill="url(%23ga)"/></svg>'/>

    <!-- ═══ WANDERER portrait (PNG with transparent background) ═══ -->
    <img id="tex-wanderer" crossorigin="anonymous" src="assets/wanderer.png"/>

    <!-- Soft blue aura around the Wanderer -->
    <img id="tex-wanderer-aura" crossorigin="anonymous" src='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 800"><defs><radialGradient id="wa" cx="50%" cy="40%"><stop offset="0%" stop-color="%2377aaff" stop-opacity="0.6"/><stop offset="40%" stop-color="%232255cc" stop-opacity="0.3"/><stop offset="100%" stop-color="%23000000" stop-opacity="0"/></radialGradient></defs><ellipse cx="250" cy="320" rx="220" ry="380" fill="url(%23wa)"/></svg>'/>
  </a-assets>

  <!-- ── CAMERA RIG ── -->
  <a-entity id="rig">
    <a-camera id="cam"
      look-controls="pointerLockEnabled:false"
      wasd-controls="enabled:false"
      position="0 1.6 0">

      <!-- Gaze cursor (center dot + progress arc) -->
      <a-entity id="gaze-cursor" position="0 0 -1.8">
        <a-ring color="#ffffff" radius-inner="0.014" radius-outer="0.018"
          material="shader:flat; opacity:0.45; color:#ffffff">
        </a-ring>
        <a-torus id="gaze-arc" radius="0.026" radius-tubular="0.004"
          theta-length="0" color="#88ccff"
          material="shader:flat; emissive:#66aaff; emissiveIntensity:2; transparent:true; opacity:0; color:#88ccff"
          rotation="0 0 90">
        </a-torus>
      </a-entity>

      <!-- ── HUD SUBTITLE PANEL ── -->
      <a-entity id="hud" position="0 -0.35 -1.5" visible="false">
        <!-- Background panel -->
        <a-plane id="hud-bg" width="1.6" height="0.44"
          material="shader:flat; color:#06001a; transparent:true; opacity:0.88">
        </a-plane>
        <!-- Left accent bar (changes color per speaker) -->
        <a-plane id="hud-bar" width="0.018" height="0.44" position="-0.79 0 0.002"
          material="shader:flat; color:#8833ff; transparent:true; opacity:0.9">
        </a-plane>
        <!-- Speaker label -->
        <a-text id="hud-speaker" value="Guardian" color="#cc88ff"
          position="-0.74 0.13 0.003" width="0.6" align="left"
          letter-spacing="2">
        </a-text>
        <!-- Dialogue text -->
        <a-text id="hud-text" value="" color="#e8ddff"
          position="-0.74 -0.03 0.003" width="1.4"
          wrap-count="40" line-height="42" align="left">
        </a-text>
      </a-entity>

    </a-camera>

    <!-- Hand tracking (Quest 3 optional) -->
    <a-entity hand-tracking-controls="hand:left" id="left-hand"></a-entity>
    <a-entity hand-tracking-controls="hand:right" id="right-hand"></a-entity>
  </a-entity>

  <!-- ══════════════════════════════════════════════════
       WORLD CONTENT
       All positioned relative to user's start (0,0,0).
       User is assumed to be standing ~1m from a real bookshelf.
       Shelf face is at z=-1.0. Content arranged along that plane.
  ══════════════════════════════════════════════════ -->

  <!-- ── AMBIENT FLOATING MOTES (always visible) ── -->
  <a-entity id="motes">
    <!-- Purple motes cluster near shelf left -->
    <a-sphere position="-0.45 1.5 -1.1" radius="0.009" color="#dd99ff"
      material="shader:flat; emissive:#cc77ff; emissiveIntensity:2.5; transparent:true; opacity:0.85"
      animation="property:position; from:-0.45 1.5 -1.1; to:-0.25 1.95 -0.9; dir:alternate; dur:4200; loop:true; easing:easeInOutSine">
    </a-sphere>
    <a-sphere position="-0.8 1.7 -1.15" radius="0.007" color="#cc88ff"
      material="shader:flat; emissive:#bb66ff; emissiveIntensity:2; transparent:true; opacity:0.75"
      animation="property:position; from:-0.8 1.7 -1.15; to:-0.6 2.2 -1.3; dir:alternate; dur:5100; loop:true; delay:800; easing:easeInOutSine">
    </a-sphere>
    <a-sphere position="-0.15 1.3 -1.2" radius="0.006" color="#ee88ff"
      material="shader:flat; emissive:#dd66ff; emissiveIntensity:2; transparent:true; opacity:0.7"
      animation="property:position; from:-0.15 1.3 -1.2; to:0.1 1.8 -1.0; dir:alternate; dur:3800; loop:true; delay:1400; easing:easeInOutSine">
    </a-sphere>
    <!-- Blue motes cluster right -->
    <a-sphere position="0.9 1.6 -1.1" radius="0.008" color="#88bbff"
      material="shader:flat; emissive:#6699ff; emissiveIntensity:2; transparent:true; opacity:0.8"
      animation="property:position; from:0.9 1.6 -1.1; to:1.1 2.1 -0.95; dir:alternate; dur:4600; loop:true; delay:600; easing:easeInOutSine">
    </a-sphere>
    <a-sphere position="1.2 1.2 -1.2" radius="0.006" color="#99ccff"
      material="shader:flat; emissive:#77aaff; emissiveIntensity:2; transparent:true; opacity:0.7"
      animation="property:position; from:1.2 1.2 -1.2; to:0.9 1.7 -1.05; dir:alternate; dur:3500; loop:true; delay:1100; easing:easeInOutSine">
    </a-sphere>
    <a-sphere position="0.5 2.0 -1.1" radius="0.007" color="#aaddff"
      material="shader:flat; emissive:#88bbff; emissiveIntensity:2; transparent:true; opacity:0.65"
      animation="property:position; from:0.5 2.0 -1.1; to:0.7 2.5 -1.3; dir:alternate; dur:5800; loop:true; delay:2000; easing:easeInOutSine">
    </a-sphere>
    <!-- Center motes -->
    <a-sphere position="0.1 1.9 -1.05" radius="0.005" color="#bbaaff"
      material="shader:flat; emissive:#9988ff; emissiveIntensity:2; transparent:true; opacity:0.6"
      animation="property:position; from:0.1 1.9 -1.05; to:0.35 2.35 -1.2; dir:alternate; dur:4900; loop:true; delay:1700; easing:easeInOutSine">
    </a-sphere>
    <a-sphere position="-0.3 0.95 -1.15" radius="0.006" color="#cc99ff"
      material="shader:flat; emissive:#bb77ff; emissiveIntensity:2; transparent:true; opacity:0.75"
      animation="property:position; from:-0.3 0.95 -1.15; to:-0.1 1.4 -0.95; dir:alternate; dur:4300; loop:true; delay:500; easing:easeInOutSine">
    </a-sphere>
  </a-entity>

  <!-- ── ACT 1: LIGHT RAYS FROM SHELF GAPS ── -->
  <a-entity id="rays">
    <!-- These fade in after ~10s via animation delay -->
    <a-plane width="0.009" height="1.4" color="#5500ee" position="-0.38 1.45 -0.995"
      rotation="0 0 4"
      material="shader:flat; emissive:#5500ee; emissiveIntensity:1.2; transparent:true; opacity:0"
      animation="property:material.opacity; from:0; to:0.14; dur:5000; delay:10000">
    </a-plane>
    <a-plane width="0.007" height="1.0" color="#7711ff" position="0.05 1.2 -0.995"
      rotation="0 0 -6"
      material="shader:flat; emissive:#7711ff; emissiveIntensity:1.2; transparent:true; opacity:0"
      animation="property:material.opacity; from:0; to:0.11; dur:4500; delay:13500">
    </a-plane>
    <a-plane width="0.008" height="1.2" color="#4400dd" position="-0.72 1.55 -0.995"
      rotation="0 0 8"
      material="shader:flat; emissive:#4400dd; emissiveIntensity:1; transparent:true; opacity:0"
      animation="property:material.opacity; from:0; to:0.16; dur:6000; delay:16000">
    </a-plane>
  </a-entity>

  <!-- ══════════════════════════════════════════════════
       GUARDIAN — Purple spirit billboard sprite
       Always faces camera. SVG portrait set via JS at runtime.
  ══════════════════════════════════════════════════ -->
  <a-entity id="guardian" visible="false" position="-0.55 1.4 -1.0" look-at-camera>
    <!-- Soft outer aura (rear plane, larger, blurred glow) -->
    <a-plane width="1.6" height="2.0" position="0 0 -0.02"
      material="shader:flat; src:#tex-guardian-aura; transparent:true; opacity:0.55; alphaTest:0.01"
      animation__pulse="property:material.opacity; from:0.4; to:0.7; dir:alternate; dur:2400; loop:true">
    </a-plane>
    <!-- Main character portrait -->
    <a-plane id="g-portrait" width="1.0" height="1.6" position="0 0 0"
      material="shader:flat; src:#tex-guardian; transparent:true; opacity:0.95; alphaTest:0.01"
      animation__float="property:position; from:0 -0.03 0; to:0 0.03 0; dir:alternate; dur:3200; loop:true; easing:easeInOutSine">
    </a-plane>
    <!-- Floating spirit orbs around guardian -->
    <a-sphere position="0.42 0.36 0.05" radius="0.026"
      material="shader:flat; emissive:#ee88ff; emissiveIntensity:2.5; color:#ee88ff; transparent:true; opacity:0.92"
      animation="property:position; from:0.42 0.36 0.05; to:0.5 0.62 0.12; dir:alternate; dur:3400; loop:true">
    </a-sphere>
    <a-sphere position="-0.46 0.28 -0.04" radius="0.02"
      material="shader:flat; emissive:#dd77ff; emissiveIntensity:2.5; color:#dd77ff; transparent:true; opacity:0.88"
      animation="property:position; from:-0.46 0.28 -0.04; to:-0.36 0.58 0.08; dir:alternate; dur:2800; loop:true; delay:600">
    </a-sphere>
    <a-sphere position="0.08 0.78 0.1" radius="0.018"
      material="shader:flat; emissive:#cc99ff; emissiveIntensity:2.5; color:#cc99ff; transparent:true; opacity:0.82"
      animation="property:position; from:0.08 0.78 0.1; to:0.22 1.0 -0.03; dir:alternate; dur:4100; loop:true; delay:1200">
    </a-sphere>
    <a-sphere position="-0.18 -0.18 0.12" radius="0.014"
      material="shader:flat; emissive:#bb88ff; emissiveIntensity:2; color:#bb88ff; transparent:true; opacity:0.75"
      animation="property:position; from:-0.18 -0.18 0.12; to:0.06 0.1 0.18; dir:alternate; dur:3700; loop:true; delay:900">
    </a-sphere>
  </a-entity>

  <!-- ══════════════════════════════════════════════════
       WANDERER — Blue spirit billboard sprite
  ══════════════════════════════════════════════════ -->
  <a-entity id="wanderer" visible="false" position="1.1 1.4 -1.0" look-at-camera>
    <!-- Soft outer aura -->
    <a-plane width="1.6" height="2.0" position="0 0 -0.02"
      material="shader:flat; src:#tex-wanderer-aura; transparent:true; opacity:0.55; alphaTest:0.01"
      animation__pulse="property:material.opacity; from:0.4; to:0.7; dir:alternate; dur:2400; loop:true; delay:380">
    </a-plane>
    <!-- Main character portrait -->
    <a-plane id="w-portrait" width="1.0" height="1.6" position="0 0 0"
      material="shader:flat; src:#tex-wanderer; transparent:true; opacity:0.95; alphaTest:0.01"
      animation__float="property:position; from:0 -0.03 0; to:0 0.03 0; dir:alternate; dur:3000; loop:true; easing:easeInOutSine; delay:200">
    </a-plane>
    <!-- Wanderer spirit orbs -->
    <a-sphere position="-0.42 0.36 0.05" radius="0.026"
      material="shader:flat; emissive:#88ccff; emissiveIntensity:2.5; color:#88ccff; transparent:true; opacity:0.92"
      animation="property:position; from:-0.42 0.36 0.05; to:-0.5 0.62 0.12; dir:alternate; dur:3100; loop:true">
    </a-sphere>
    <a-sphere position="0.44 0.3 -0.04" radius="0.02"
      material="shader:flat; emissive:#aaddff; emissiveIntensity:2.5; color:#aaddff; transparent:true; opacity:0.88"
      animation="property:position; from:0.44 0.3 -0.04; to:0.54 0.58 0.08; dir:alternate; dur:2600; loop:true; delay:550">
    </a-sphere>
    <a-sphere position="0.1 0.78 0.08" radius="0.018"
      material="shader:flat; emissive:#99bbff; emissiveIntensity:2.5; color:#99bbff; transparent:true; opacity:0.82"
      animation="property:position; from:0.1 0.78 0.08; to:-0.08 1.0 -0.04; dir:alternate; dur:3900; loop:true; delay:1000">
    </a-sphere>
  </a-entity>

  <!-- ══════════════════════════════════════════════════
       PURPLE ORBS (×3) — proximity / reach to collect
       Positioned 0.7-0.9m in front of shelf, eye-level
       Proximity threshold: 1.1m from camera center
  ══════════════════════════════════════════════════ -->

  <!-- Orb P1: left shelf, chest-eye level -->
  <a-entity id="porb0" class="purple-orb" visible="false" position="-0.72 1.42 -0.72">
    <a-sphere radius="0.078"
      material="shader:flat; emissive:#bb33ff; emissiveIntensity:1.8; color:#dd55ff; transparent:true; opacity:0.96"
      animation="property:scale; from:0.82 0.82 0.82; to:1.2 1.2 1.2; dir:alternate; dur:1350; loop:true">
    </a-sphere>
    <a-sphere radius="0.14"
      material="shader:flat; emissive:#9922dd; emissiveIntensity:0.5; color:#aa44ee; transparent:true; opacity:0.18"
      animation="property:scale; from:0.78 0.78 0.78; to:1.28 1.28 1.28; dir:alternate; dur:2000; loop:true">
    </a-sphere>
    <!-- Sparkle center -->
    <a-sphere radius="0.024" position="0.026 0.026 0"
      material="shader:flat; emissive:#ffffff; emissiveIntensity:4; color:#ffffff; transparent:true; opacity:0.95">
    </a-sphere>
    <a-text value="Reach" color="#dd99ff" width="0.28" align="center"
      position="0 0.22 0" material="shader:flat">
    </a-text>
  </a-entity>

  <!-- Orb P2: slightly lower, left-center -->
  <a-entity id="porb1" class="purple-orb" visible="false" position="-1.05 1.22 -0.75">
    <a-sphere radius="0.078"
      material="shader:flat; emissive:#bb33ff; emissiveIntensity:1.8; color:#dd55ff; transparent:true; opacity:0.96"
      animation="property:scale; from:0.82 0.82 0.82; to:1.2 1.2 1.2; dir:alternate; dur:1550; loop:true">
    </a-sphere>
    <a-sphere radius="0.14"
      material="shader:flat; emissive:#9922dd; emissiveIntensity:0.5; color:#aa44ee; transparent:true; opacity:0.18"
      animation="property:scale; from:0.78 0.78 0.78; to:1.28 1.28 1.28; dir:alternate; dur:2200; loop:true">
    </a-sphere>
    <a-sphere radius="0.024" position="0.026 0.026 0"
      material="shader:flat; emissive:#ffffff; emissiveIntensity:4; color:#ffffff; transparent:true; opacity:0.95">
    </a-sphere>
    <a-text value="Reach" color="#dd99ff" width="0.28" align="center"
      position="0 0.22 0" material="shader:flat">
    </a-text>
  </a-entity>

  <!-- Orb P3: upper left, near eye level -->
  <a-entity id="porb2" class="purple-orb" visible="false" position="-0.5 1.72 -0.78">
    <a-sphere radius="0.078"
      material="shader:flat; emissive:#bb33ff; emissiveIntensity:1.8; color:#dd55ff; transparent:true; opacity:0.96"
      animation="property:scale; from:0.82 0.82 0.82; to:1.2 1.2 1.2; dir:alternate; dur:1150; loop:true">
    </a-sphere>
    <a-sphere radius="0.14"
      material="shader:flat; emissive:#9922dd; emissiveIntensity:0.5; color:#aa44ee; transparent:true; opacity:0.18"
      animation="property:scale; from:0.78 0.78 0.78; to:1.28 1.28 1.28; dir:alternate; dur:1750; loop:true">
    </a-sphere>
    <a-sphere radius="0.024" position="0.026 0.026 0"
      material="shader:flat; emissive:#ffffff; emissiveIntensity:4; color:#ffffff; transparent:true; opacity:0.95">
    </a-sphere>
    <a-text value="Reach" color="#dd99ff" width="0.28" align="center"
      position="0 0.22 0" material="shader:flat">
    </a-text>
  </a-entity>

  <!-- ══════════════════════════════════════════════════
       BLUE ORBS (×3) — gaze / dwell 2s to collect
  ══════════════════════════════════════════════════ -->

  <!-- Orb B1: upper right, drifting -->
  <a-entity id="borb0" class="blue-orb" visible="false" position="0.6 1.92 -0.85">
    <a-sphere radius="0.078"
      material="shader:flat; emissive:#2255ee; emissiveIntensity:1.8; color:#44aaff; transparent:true; opacity:0.96"
      animation="property:position; from:0 0 0; to:0.16 0.11 0; dir:alternate; dur:2500; loop:true">
    </a-sphere>
    <a-sphere radius="0.14"
      material="shader:flat; emissive:#1133cc; emissiveIntensity:0.5; color:#3388ff; transparent:true; opacity:0.18"
      animation="property:scale; from:0.78 0.78 0.78; to:1.28 1.28 1.28; dir:alternate; dur:2100; loop:true">
    </a-sphere>
    <!-- Gaze progress ring -->
    <a-torus id="gring0" radius="0.13" radius-tubular="0.007" color="#88ddff"
      theta-length="0" rotation="0 0 90"
      material="shader:flat; emissive:#66bbff; emissiveIntensity:2.5; transparent:true; opacity:0; color:#88ddff">
    </a-torus>
    <a-sphere radius="0.024" position="0.026 0.026 0"
      material="shader:flat; emissive:#ffffff; emissiveIntensity:4; color:#ffffff; transparent:true; opacity:0.95">
    </a-sphere>
    <a-text value="Gaze 2s" color="#88ccff" width="0.28" align="center"
      position="0 0.22 0" material="shader:flat">
    </a-text>
  </a-entity>

  <!-- Orb B2: wanderer's side, mid height -->
  <a-entity id="borb1" class="blue-orb" visible="false" position="1.28 1.52 -0.82">
    <a-sphere radius="0.078"
      material="shader:flat; emissive:#2255ee; emissiveIntensity:1.8; color:#44aaff; transparent:true; opacity:0.96"
      animation="property:position; from:0 0 0; to:0.12 0.15 0; dir:alternate; dur:2000; loop:true">
    </a-sphere>

<script>
'use strict';

// ────────────────────────────────────────────────
// COMPONENT: billboard — always face camera (Y-axis only)

AFRAME.registerComponent('look-at-camera', {
  init: function () {
    this.cam = document.querySelector('[camera]');
    this._v = new THREE.Vector3();
  },
  tick: function () {
    if (!this.cam) {
      this.cam = document.querySelector('[camera]');
      if (!this.cam) return;
    }
    const camObj = this.cam.object3D;
    const myObj = this.el.object3D;
    camObj.getWorldPosition(this._v);
    // Only rotate around Y axis so character stays upright
    const dx = this._v.x - myObj.position.x;
    const dz = this._v.z - myObj.position.z;
    myObj.rotation.y = Math.atan2(dx, dz);
  }
});

// ────────────────────────────────────────────────
// STATE
// ────────────────────────────────────────────────
let phase = 'loading';
let orbPhase = 0;
let waitCollect = false;

let collectIdx = -1;
let onCollect = null;
let gazeStart = 0;
let gazeOrbEl = null;
let gazeRingEl = null;
let dlgTimer = null;
let tickBound = false;
let purpleCount = 0;
let blueCount = 0;

// DOM cache
const D = {};
function cacheDOM() {
  D.scene    = document.getElementById('scene');
  D.cam      = document.getElementById('cam');
  D.hud      = document.getElementById('hud');
  D.hudBg    = document.getElementById('hud-bg');

  D.lightWeb = document.getElementById('light-web');
  D.gPoint   = document.getElementById('g-point');
  D.wPoint   = document.getElementById('w-point');
  D.hint     = document.getElementById('hint');
  D.counter  = document.getElementById('orb-counter');
  D.porbs    = [0,1,2].map(i => document.getElementById('porb'+i));
  D.borbs    = [0,1,2].map(i => document.getElementById('borb'+i));
  D.grings   = [0,1,2].map(i => document.getElementById('gring'+i));
}


// ────────────────────────────────────────────────
// ENTRY POINT
// ────────────────────────────────────────────────
function enterAR() {
  // Hide overlay
  document.getElementById('overlay').style.display = 'none';
  cacheDOM();
  D.hint.style.display = 'block';
  D.counter.style.display = 'block';
  D.hint.textContent = 'Entering the experience…';

  // Listen for AR/VR session events
  D.scene.addEventListener('enter-ar', () => {
    window._arMode = true;
    D.hint.textContent = 'Light is seeping through the shelves…';
  });
  D.scene.addEventListener('enter-vr', () => {
    window._arMode = true;
    D.hint.textContent = 'Light is seeping through the shelves… (VR mode)';
  });
  D.scene.addEventListener('exit-ar', () => { window._arMode = false; });
  D.scene.addEventListener('exit-vr', () => { window._arMode = false; });

  // CRITICAL: must be called synchronously inside the click handler so the
  // user-gesture token reaches navigator.xr.requestSession().
  async function tryEnterImmersive() {
    if (!navigator.xr) { enableDesktopMode(); return; }

    const arSupported = await navigator.xr.isSessionSupported('immersive-ar').catch(() => false);
    if (arSupported) {
      // enterAR() is the correct A-Frame 1.5 method for passthrough AR
      if (typeof D.scene.enterAR === 'function') {
        try { await D.scene.enterAR(); return; } catch(e) { console.warn('enterAR() failed:', e); }
      }
      // Direct WebXR fallback if A-Frame enterAR() unavailable
      try {
        const session = await navigator.xr.requestSession('immersive-ar', {
          requiredFeatures: ['local-floor'],
          optionalFeatures: ['dom-overlay'],
        });
        D.scene.renderer.xr.setSession(session);
        window._arMode = true;
        D.hint.textContent = 'Light is seeping through the shelves…';
        return;
      } catch(e2) { console.warn('direct requestSession(ar) failed:', e2); }
    }

    const vrSupported = await navigator.xr.isSessionSupported('immersive-vr').catch(() => false);
    if (vrSupported) {
      try { await D.scene.enterVR(); return; } catch(e) { console.warn('enterVR() failed:', e); }
    }

    enableDesktopMode();
  }

  // Make sure scene is ready before requesting session
  if (D.scene.hasLoaded) {
    tryEnterImmersive();
  } else {
    D.scene.addEventListener('loaded', tryEnterImmersive, { once: true });
  }

  // Safety net: if nothing happened in 4s, drop to desktop preview
  setTimeout(() => {
    if (!window._arMode && !window._desktopMode) {
      enableDesktopMode();
    }
  }, 4000);

  // Hook tick after scene loads
  if (D.scene.hasLoaded) {
    bindTick();
  } else {
    D.scene.addEventListener('loaded', bindTick, { once: true });
  }

  setTimeout(startExperience, 3500);
}

function enableDesktopMode() {
  if (window._desktopMode) return;
  window._desktopMode = true;
  // alpha:true = canvas is transparent, so styling the body shows through
  document.body.style.background =
    'radial-gradient(ellipse at 50% 30%, #1a004d 0%, #08001a 55%, #000 100%)';
  D.hint.textContent = '💻 Desktop preview · drag mouse to look around';
  // Enable mouse look-controls for desktop preview so users can see characters
  if (D.cam) {
    D.cam.setAttribute('look-controls', 'pointerLockEnabled:false; reverseMouseDrag:false');
  }
}

function bindTick() {
  if (tickBound) return;
  tickBound = true;
  D.scene.addEventListener('tick', onTick);
}

// ────────────────────────────────────────────────
// EXPERIENCE FLOW  (async/await narrative engine)
// ────────────────────────────────────────────────
async function startExperience() {
  phase = 'act1';

async function act2_guardian() {

async function act2_wanderer() {

async function act3_collect() {
  phase = 'act3';
  D.hint.textContent = 'Reach the purple orbs · Gaze 2s at the blue ones';
  for (let i = 0; i < SCRIPT.orbs.length; i++) {
    orbPhase = i;
    await runOrb(SCRIPT.orbs[i]);
    await sleep(1400);
  }
  await act4_confluence();
}

async function runOrb(orbData) {
  await playLine(orbData.before);

  if (orbData.type === 'purple') {
    D.porbs[orbData.idx].setAttribute('visible', true);
    collectType = 'purple';
    collectIdx = orbData.idx;
  } else {
    D.borbs[orbData.idx].setAttribute('visible', true);
    gazeOrbEl  = D.borbs[orbData.idx];
    gazeRingEl = D.grings[orbData.idx];
    gazeStart  = 0;
    collectType = 'blue';
    collectIdx = orbData.idx;
  }

  waitCollect = true;
  // Auto-advance after 12 seconds so story never permanently stalls
  const autoTimer = setTimeout(() => {
    if (onCollect) { const cb = onCollect; onCollect = null; waitCollect = false; cb(); }
  }, 12000);
  await new Promise(res => { onCollect = res; });
  clearTimeout(autoTimer);
  waitCollect = false;

  // Hide orb + flash
  if (orbData.type === 'purple') {
    D.porbs[orbData.idx].setAttribute('visible', false);
    purpleCount++;
  } else {
    D.borbs[orbData.idx].setAttribute('visible', false);
    resetGazeRing(orbData.idx);
    gazeOrbEl = null;
    gazeStart  = 0;
    blueCount++;
  }
  updateCounter();
  spawnCollectFlash(orbData.type);
  await sleep(500);

  await playLine(orbData.after);
  if (orbData.after.followup) {
    await sleep(700);
    await playLine(orbData.after.followup);
  }
}

async function act4_confluence() {
  phase = 'act4';
  D.hint.textContent = 'A web of light spreads across the shelves…';
  D.lightWeb.setAttribute('visible', true);
  await sleep(800);
  await playLines(SCRIPT.act4);
  await sleep(9000); // light web fades
  await act5_farewell();
}

async function act5_farewell() {
  phase = 'act5';
  // Wanderer fades out silently while guardian speaks
  fadeEntity(D.wanderer, 4000);
  await playLines(SCRIPT.act5);
  await sleep(1800);
  fadeEntity(D.guardian, 6000);
  await sleep(6500);
  D.hint.textContent = '✦ End of the experience · Thank you for visiting ✦';
  hideHUD();
  phase = 'done';
}

// ────────────────────────────────────────────────
// TICK — proximity + gaze detection
// ────────────────────────────────────────────────
let _lastTick = 0;
const _v3a = new THREE.Vector3();
const _v3b = new THREE.Vector3();
const _v3c = new THREE.Vector3();

function onTick() {
  const now = Date.now();
  if (now - _lastTick < 60) return;   // ~16fps check
  _lastTick = now;
  if (!waitCollect) return;

  const camObj = D.cam.object3D;
  if (!camObj) return;

  if (collectType === 'purple') {
    tickProximity(camObj);
  } else if (collectType === 'blue') {
    tickGaze(camObj);
  }
}

const PROX_THRESHOLD = 1.15; // metres from camera to orb

function tickProximity(camObj) {
  const orb = D.porbs[collectIdx];
  if (!orb || !orb.getAttribute('visible')) return;

  camObj.getWorldPosition(_v3a);
  orb.object3D.getWorldPosition(_v3b);

  const dist = _v3a.distanceTo(_v3b);
  if (dist < PROX_THRESHOLD) {
    fireCollect();
  }
}

const GAZE_ANGLE_DEG = 9;
const GAZE_DURATION  = 2000;

function tickGaze(camObj) {
  if (!gazeOrbEl) return;

  camObj.getWorldPosition(_v3a);
  camObj.getWorldDirection(_v3c);
  gazeOrbEl.object3D.getWorldPosition(_v3b);

  const toOrb = _v3b.clone().sub(_v3a).normalize();
  const dot = _v3c.dot(toOrb);
  const angleDeg = Math.acos(Math.max(-1, Math.min(1, dot))) * (180 / Math.PI);

  if (angleDeg < GAZE_ANGLE_DEG) {
    const now = Date.now();
    if (!gazeStart) gazeStart = now;
    const elapsed = now - gazeStart;
    const t = Math.min(elapsed / GAZE_DURATION, 1);

    // Update gaze ring on the orb
    if (gazeRingEl) {
      gazeRingEl.setAttribute('theta-length', t * 360);
      gazeRingEl.setAttribute('material',
        `shader:flat; emissive:#66bbff; emissiveIntensity:2.5; transparent:true; opacity:${0.3 + t * 0.7}; color:#88ddff`);
    }
    // Update HUD gaze arc
    D.gazeArc.setAttribute('theta-length', t * 360);
    D.gazeArc.setAttribute('material',
      `shader:flat; emissive:#66aaff; emissiveIntensity:2; transparent:true; opacity:${t * 0.85}; color:#88ccff`);

    if (t >= 1) fireCollect();
  } else {
    // Reset
    if (gazeStart) {
      gazeStart = 0;
      if (gazeRingEl) {
        gazeRingEl.setAttribute('theta-length', 0);
        gazeRingEl.setAttribute('material', 'transparent:true; opacity:0');
      }
      D.gazeArc.setAttribute('theta-length', 0);
      D.gazeArc.setAttribute('material', 'transparent:true; opacity:0');
    }
  }
}

function fireCollect() {
  if (!onCollect) return;
  const cb = onCollect;
  onCollect = null;
  waitCollect = false;
  // Reset gaze arc
  D.gazeArc.setAttribute('theta-length', 0);
  D.gazeArc.setAttribute('material', 'transparent:true; opacity:0');
  cb();
}

function resetGazeRing(idx) {
  const r = D.grings[idx];
  if (!r) return;
  r.setAttribute('theta-length', 0);
  r.setAttribute('material', 'transparent:true; opacity:0');
}

// ────────────────────────────────────────────────
// DIALOGUE / HUD
// ────────────────────────────────────────────────
function playLine(line) {
  return new Promise(resolve => {
    const isG = line.spkr === 'g';

    D.hudBar.setAttribute('material',
      isG ? 'color:#9922ff; shader:flat; transparent:true; opacity:0.9'
          : 'color:#2255ff; shader:flat; transparent:true; opacity:0.9');
    D.hudSpkr.setAttribute('color', isG ? '#cc88ff' : '#88bbff');
    D.hudSpkr.setAttribute('value', line.name || (isG ? 'Guardian':'Wanderer'));
    D.hudTxt.setAttribute('value', line.txt);
    D.hud.setAttribute('visible', true);

    const dur = line.dur || Math.max(3500, line.txt.length * 95);
    if (dlgTimer) clearTimeout(dlgTimer);
    dlgTimer = setTimeout(() => {
      hideHUD();
      resolve();
    }, dur);
  });
}

async function playLines(lines) {
  for (const l of lines) {
    await playLine(l);
    await sleep(600);
  }
}

function hideHUD() {
  D.hud.setAttribute('visible', false);
}

// ────────────────────────────────────────────────
// VFX HELPERS
// ────────────────────────────────────────────────
function spawnCollectFlash(type) {
  const color = type === 'purple' ? '#dd77ff' : '#77bbff';
  const emissive = type === 'purple' ? '#cc55ff' : '#5599ff';
  const flash = document.createElement('a-sphere');
  flash.setAttribute('radius', '0.18');
  flash.setAttribute('material',
    `shader:flat; emissive:${emissive}; emissiveIntensity:3; transparent:true; opacity:0.88; color:${color}`);
  flash.setAttribute('position', '0 -0.1 -0.5');
  flash.setAttribute('animation',
    'property:material.opacity; from:0.88; to:0; dur:700; easing:easeOutCubic');
  D.cam.appendChild(flash);
  setTimeout(() => flash.remove(), 800);
}

function fadeEntity(entity, duration) {
  entity.querySelectorAll('[material]').forEach(el => {
    const existing = el.getAttribute('material');
    el.setAttribute('animation__fade',
      `property:material.opacity; to:0; dur:${duration}; easing:easeInCubic`);
  });
  setTimeout(() => entity.setAttribute('visible', false), duration + 100);
}

function animLight(el, targetIntensity, dur) {
  el.setAttribute('animation',
    `property:intensity; from:0; to:${targetIntensity}; dur:${dur}; easing:easeOutCubic`);
}

function updateCounter() {
  D.counter.textContent = `🟣 ${purpleCount}/3   🔵 ${blueCount}/3`;
}

// ────────────────────────────────────────────────
// UTILITY
// ────────────────────────────────────────────────
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
</body>
